# deploys the static site in site/ to github pages, pulling screenshots from docs/.
name: deploy pages

on:
  push:
    branches: [main]
    paths: ["site/**", "docs/screenshots/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: assemble site
        run: |
          mkdir -p _site/shots
          cp -r site/* _site/
          cp docs/screenshots/* _site/shots/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
